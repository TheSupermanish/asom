name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: contracts (forge)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Check formatting
        working-directory: packages/contracts
        run: forge fmt --check

      - name: Build (paris EVM — Shannon has no PUSH0)
        working-directory: packages/contracts
        run: forge build

      - name: Test
        working-directory: packages/contracts
        run: forge test -vvv

  js:
    name: sdk + cli (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # SDK integration tests spin up anvil and deploy the contracts, so the
      # JS job needs the Foundry toolchain on PATH too.
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build
        run: pnpm build

      - name: Test SDK (anvil integration + unit)
        run: pnpm --filter @tsugu/sdk test

      - name: Test CLI
        run: pnpm --filter @tsugu/cli test
